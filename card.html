<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    /* From Uiverse.io by vinodjangid07 */
    .button {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background-color: rgb(20, 20, 20);
        border: none;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.164);
        cursor: pointer;
        transition-duration: .3s;
        overflow: hidden;
        position: relative;
    }

    .svgIcon {
        width: 12px;
        transition-duration: .3s;
    }

    .svgIcon path {
        fill: white;
    }

    .button:hover {
        width: 140px;
        border-radius: 50px;
        transition-duration: .3s;
        background-color: rgb(255, 69, 69);
        align-items: center;
    }

    .button:hover .svgIcon {
        width: 50px;
        transition-duration: .3s;
        transform: translateY(60%);
    }

    .button::before {
        position: absolute;
        top: -20px;
        content: "Delete";
        color: white;
        transition-duration: .3s;
        font-size: 2px;
    }

    .button:hover::before {
        font-size: 13px;
        opacity: 1;
        transform: translateY(30px);
        transition-duration: .3s;
    }

    .card {
        position: relative;
    }

    .card::after {
        content: "";
        position: absolute;
        width: 80px;
        height: 40px;
        background: #356c56;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        border-radius: 40px 40px 0 0;
    }

    .subscribe-form {
        display: flex;
        align-items: center;
        gap: 12px;

        max-width: 600px;
        width: 100%;

        padding: 6px;

        border: 1px solid #5d5d5d;
        border-radius: 14px;
        background: #fff;
    }

    .subscribe-form input[type="email"] {
        flex: 1;
        border: none;
        outline: none;

        padding: 15px 25px;

        font-size: 18px;
        color: #333;
        background: transparent;
    }

    .subscribe-form input[type="email"]::placeholder {
        color: #8a8a8a;
    }

    .subscribe-form input[type="submit"] {
        border: none;
        outline: none;

        padding: 15px 35px;

        background: #dd321b;
        color: #fff;

        font-size: 18px;
        border-radius: 10px;

        cursor: pointer;
        transition: .3s;
    }

    .subscribe-form input[type="submit"]:hover {
        background: #c52c18;
    }

    .subscribe-form {
        display: flex;
    }

    .subscribe-form input[type="email"] {
        flex: 1;
    }

    .subscribe-form input[type="submit"] {
        flex-shrink: 0;
    }
</style>

<body>
    <form class="subscribe-form">
        <input type="email" placeholder="Your email" required>

        <input type="submit" value="Subscribe">
    </form>
    <div class="card" style="background-color: red; overflow: hidden; width: 490px;">

        <!-- Content Section -->
        <div class="card-content">
            <p class="card-tag">Video & Tips</p>
            <h2 class="card-title">Those Other College Expenses You Aren't Thinking About</h2>

            <!-- Meta Info Section -->
            <div class="card-meta">
                <span class="meta-item author">
                    <svg xmlns="http://w3.org" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    Owen Christ
                </span>
                <span class="meta-item date">
                    <svg xmlns="http://w3.org" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Jan 25, 2021
                </span>
            </div>
        </div>

        <!-- Floating Bottom Button -->
        <button class="card-btn" aria-label="Read more">
            <svg xmlns="http://w3.org" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="19 12 12 19 5 12"></polyline>
            </svg>
        </button>
    </div>
</body>

</html>
